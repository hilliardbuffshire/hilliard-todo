<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hilliard Buffshire · Task Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','Noto Sans KR','system-ui','sans-serif']}}}}
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Noto Sans KR',system-ui,sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px}
.dark ::-webkit-scrollbar-thumb{background:#374151}
.no-scroll::-webkit-scrollbar{width:0}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-up{animation:fadeUp .2s ease both}
.fade-in{animation:fadeIn .15s ease both}
.task-row{transition:all .12s ease}
.cal-cell{transition:all .12s ease}
select option{background:#18181b;color:#f4f4f5}
.dark select{color-scheme:dark}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
(()=>{
const {useState,useEffect,useRef,useMemo,useCallback}=React;

/* ─── Firebase ─── */
firebase.initializeApp({
  apiKey:"AIzaSyDEPq3SqOCiltpmesT3vP9Jp7a_ujFou1k",
  authDomain:"daily-task-planner-9187f.firebaseapp.com",
  projectId:"daily-task-planner-9187f",
  storageBucket:"daily-task-planner-9187f.firebasestorage.app",
  messagingSenderId:"309757618979",
  appId:"1:309757618979:web:79fbdc11fbfbcdffa9ba96"
});
const auth=firebase.auth();
const db=firebase.firestore();
const ID_DOMAIN="@hilliard.buffshire.internal";
const toEmail=id=>id.toLowerCase().trim()+ID_DOMAIN;

/* ─── Icons ─── */
const I=({n,s=16,c=""})=>{
  const d={
    check:<svg width={s}height={s}viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2.5"strokeLinecap="round"strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
    plus:<svg width={s}height={s}viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2"strokeLinecap="round"strokeLinejoin="round"><line x1="12"y1="5"x2="12"y2="19"/><line x1="5"y1="12"x2="19"y2="12"/></svg>,
    cal:<svg width={s}height={s}viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2"strokeLinecap="round"strokeLinejoin="round"><rect x="3"y="4"width="18"height="18"rx="2"/><line x1="16"y1="2"x2="16"y2="6"/><line x1="8"y1="2"x2="8"y2="6"/><line x1="3"y1="10"x2="21"y2="10"/></svg>,
    edit:<svg width={s}height={s}viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2"strokeLinecap="round"strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>,
    trash:<svg width={s}height={s}viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2"strokeLinecap="round"strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>,
    sun:<svg width={s}height={s}viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2"strokeLinecap="round"strokeLinejoin="round"><circle cx="12"cy="12"r="5"/><line x1="12"y1="1"x2="12"y2="3"/><line x1="12"y1="21"x2="12"y2="23"/><line x1="4.22"y1="4.22"x2="5.64"y2="5.64"/><line x1="18.36"y1="18.36"x2="19.78"y2="19.78"/><line x1="1"y1="12"x2="3"y2="12"/><line x1="21"y1="12"x2="23"y2="12"/><line x1="4.22"y1="19.78"x2="5.64"y2="18.36"/><line x1="18.36"y1="5.64"x2="19.78"y2="4.22"/></svg>,
    moon:<svg width={s}height={s}viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2"strokeLinecap="round"strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
    x:<svg width={s}height={s}viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2"strokeLinecap="round"strokeLinejoin="round"><line x1="18"y1="6"x2="6"y2="18"/><line x1="6"y1="6"x2="18"y2="18"/></svg>,
    chevL:<svg width={s}height={s}viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2"strokeLinecap="round"strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
    chevR:<svg width={s}height={s}viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2"strokeLinecap="round"strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
    search:<svg width={s}height={s}viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2"strokeLinecap="round"strokeLinejoin="round"><circle cx="11"cy="11"r="8"/><line x1="21"y1="21"x2="16.65"y2="16.65"/></svg>,
    logout:<svg width={s}height={s}viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2"strokeLinecap="round"strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21"y1="12"x2="9"y2="12"/></svg>,
    menu:<svg width={s}height={s}viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2"strokeLinecap="round"strokeLinejoin="round"><line x1="3"y1="12"x2="21"y2="12"/><line x1="3"y1="6"x2="21"y2="6"/><line x1="3"y1="18"x2="21"y2="18"/></svg>,
    clock:<svg width={s}height={s}viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2"strokeLinecap="round"strokeLinejoin="round"><circle cx="12"cy="12"r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    inbox:<svg width={s}height={s}viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2"strokeLinecap="round"strokeLinejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>,
    list:<svg width={s}height={s}viewBox="0 0 24 24"fill="none"stroke="currentColor"strokeWidth="2"strokeLinecap="round"strokeLinejoin="round"><line x1="8"y1="6"x2="21"y2="6"/><line x1="8"y1="12"x2="21"y2="12"/><line x1="8"y1="18"x2="21"y2="18"/><line x1="3"y1="6"x2="3.01"y2="6"/><line x1="3"y1="12"x2="3.01"y2="12"/><line x1="3"y1="18"x2="3.01"y2="18"/></svg>,
  };
  return <span className={`inline-flex items-center justify-center ${c}`}>{d[n]||null}</span>;
};

/* ─── Utils ─── */
const TODAY=()=>new Date().toISOString().split('T')[0];
const fmtDate=d=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return`${dt.getMonth()+1}/${dt.getDate()}`;};
const PRI={high:{lbl:'높음',dot:'bg-red-500',txt:'text-red-500'},medium:{lbl:'보통',dot:'bg-amber-400',txt:'text-amber-500'},low:{lbl:'낮음',dot:'bg-emerald-500',txt:'text-emerald-500'}};
const ERRMAP={'auth/user-not-found':'존재하지 않는 아이디입니다.','auth/wrong-password':'비밀번호가 올바르지 않습니다.','auth/email-already-in-use':'이미 사용 중인 아이디입니다.','auth/weak-password':'비밀번호는 6자 이상이어야 합니다.','auth/invalid-credential':'아이디 또는 비밀번호가 올바르지 않습니다.','auth/too-many-requests':'잠시 후 다시 시도하세요.'};

/* ─── AUTH ─── */
function AuthScreen(){
  const[tab,setTab]=useState('login');
  const[id,setId]=useState('');
  const[pw,setPw]=useState('');
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);
  const[showPw,setShowPw]=useState(false);
  const submit=async()=>{
    setErr('');
    if(!id.trim()){setErr('아이디를 입력하세요.');return;}
    if(!pw){setErr('비밀번호를 입력하세요.');return;}
    if(tab==='signup'){
      if(id.trim().length<4){setErr('아이디는 4자 이상이어야 합니다.');return;}
      if(!/^[a-zA-Z0-9_]+$/.test(id.trim())){setErr('영문, 숫자, 밑줄(_)만 사용 가능합니다.');return;}
      if(pw.length<6){setErr('비밀번호는 6자 이상이어야 합니다.');return;}
    }
    setBusy(true);
    try{
      if(tab==='login'){await auth.signInWithEmailAndPassword(toEmail(id),pw);}
      else{const c=await auth.createUserWithEmailAndPassword(toEmail(id),pw);await c.user.updateProfile({displayName:id.trim()});}
    }catch(e){setErr(ERRMAP[e.code]||e.message);setBusy(false);}
  };
  const inp=`w-full px-3.5 py-2.5 rounded-xl border text-sm outline-none transition-all bg-white dark:bg-zinc-800 border-zinc-200 dark:border-zinc-700 text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 dark:placeholder-zinc-600 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20`;
  return(
    <div className="min-h-screen flex items-center justify-center bg-zinc-50 dark:bg-zinc-950 p-4">
      <div className="w-full max-w-sm fade-up">
        <div className="text-center mb-8">
          <div className="inline-flex w-14 h-14 rounded-2xl bg-indigo-600 items-center justify-center mb-4 shadow-lg shadow-indigo-500/30">
            <I n="list" s={22} c="text-white"/>
          </div>
          <h1 className="text-xl font-bold text-zinc-900 dark:text-zinc-100">Hilliard Buffshire</h1>
          <p className="text-sm text-zinc-500 dark:text-zinc-500 mt-1">Task Planner · 힐리아드 버프셔</p>
        </div>
        <div className="bg-white dark:bg-zinc-900 rounded-2xl border border-zinc-200 dark:border-zinc-800 p-6 shadow-xl shadow-black/5 dark:shadow-black/40">
          <div className="flex rounded-xl bg-zinc-100 dark:bg-zinc-800 p-1 mb-5">
            {['login','signup'].map(t=>(
              <button key={t} onClick={()=>{setTab(t);setErr('');}}
                className={`flex-1 py-2 text-sm font-medium rounded-lg transition-all ${tab===t?'bg-white dark:bg-zinc-700 text-zinc-900 dark:text-zinc-100 shadow-sm':'text-zinc-500 dark:text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-200'}`}>
                {t==='login'?'로그인':'회원가입'}
              </button>
            ))}
          </div>
          <div className="space-y-3">
            <div>
              <label className="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">아이디</label>
              <input className={inp} placeholder="아이디 입력" value={id} onChange={e=>setId(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
            </div>
            <div>
              <label className="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">비밀번호</label>
              <div className="relative">
                <input className={inp} type={showPw?'text':'password'} placeholder="비밀번호 입력" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
                <button onClick={()=>setShowPw(!showPw)} className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300">{showPw?'숨김':'표시'}</button>
              </div>
            </div>
          </div>
          {err&&<div className="mt-3 px-3 py-2 rounded-xl bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/20 text-red-600 dark:text-red-400 text-xs">{err}</div>}
          <button onClick={submit} disabled={busy} className="w-full mt-4 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 active:scale-[.98] text-white text-sm font-semibold transition-all shadow-md shadow-indigo-500/25 disabled:opacity-60">
            {busy?'처리 중...':(tab==='login'?'로그인':'회원가입')}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── QUICK ADD ─── */
function QuickAdd({onAdd,darkMode,defDate}){
  const[open,setOpen]=useState(false);
  const[title,setTitle]=useState('');
  const[pri,setPri]=useState('medium');
  const[due,setDue]=useState(defDate||'');
  const[cat,setCat]=useState('');
  const[desc,setDesc]=useState('');
  const ref=useRef();
  const submit=()=>{
    if(!title.trim())return;
    onAdd({title:title.trim(),priority:pri,dueDate:due,category:cat.trim(),desc:desc.trim()});
    setTitle('');setPri('medium');setDue(defDate||'');setCat('');setDesc('');setOpen(false);
  };
  useEffect(()=>{if(open)setTimeout(()=>ref.current?.focus(),50);},[open]);
  const inp=`w-full px-3 py-2 rounded-xl border text-sm outline-none transition-all bg-white dark:bg-zinc-800 border-zinc-200 dark:border-zinc-700 text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 dark:placeholder-zinc-500 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/30`;
  return(
    <div className="mb-4">
      {!open?(
        <button id="quick-add-trigger" onClick={()=>setOpen(true)}
          className="w-full flex items-center gap-2.5 px-4 py-3 rounded-xl border border-dashed border-zinc-300 dark:border-zinc-700 text-zinc-400 dark:text-zinc-600 hover:border-indigo-400 hover:text-indigo-500 dark:hover:border-indigo-500/50 dark:hover:text-indigo-400 hover:bg-indigo-50/50 dark:hover:bg-indigo-500/5 transition-all text-sm">
          <I n="plus" s={16}/><span>할 일 추가<span className="text-xs opacity-50 ml-2">Ctrl+N</span></span>
        </button>
      ):(
        <div className="rounded-xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-900 p-4 shadow-lg dark:shadow-black/30 fade-up">
          <input ref={ref} className={inp+' mb-2.5 font-medium'} placeholder="무엇을 해야 하나요?" value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')submit();if(e.key==='Escape')setOpen(false);}}/>
          <textarea className={inp+' mb-2.5 resize-none h-14 text-xs'} placeholder="메모 (선택)" value={desc} onChange={e=>setDesc(e.target.value)}/>
          <div className="grid grid-cols-3 gap-2 mb-3">
            <div><label className="block text-xs text-zinc-400 dark:text-zinc-500 mb-1">우선순위</label>
              <select className={inp+' cursor-pointer text-xs'} value={pri} onChange={e=>setPri(e.target.value)}>
                <option value="high">🔴 높음</option><option value="medium">🟡 보통</option><option value="low">🟢 낮음</option>
              </select></div>
            <div><label className="block text-xs text-zinc-400 dark:text-zinc-500 mb-1">마감일</label>
              <input type="date" className={inp+' text-xs'} value={due} onChange={e=>setDue(e.target.value)}/></div>
            <div><label className="block text-xs text-zinc-400 dark:text-zinc-500 mb-1">카테고리</label>
              <input className={inp+' text-xs'} placeholder="예: 업무" value={cat} onChange={e=>setCat(e.target.value)}/></div>
          </div>
          <div className="flex gap-2 justify-end">
            <button onClick={()=>setOpen(false)} className="px-3 py-1.5 rounded-lg text-xs font-medium text-zinc-500 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all">취소</button>
            <button onClick={submit} className="px-4 py-1.5 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold transition-all">추가</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── TASK ITEM ─── */
function TaskItem({task,onToggle,onEdit,onDelete}){
  const[hover,setHover]=useState(false);
  const today=TODAY();
  const overdue=task.dueDate&&task.dueDate<today&&!task.completed;
  const isToday=task.dueDate===today;
  const p=PRI[task.priority]||PRI.medium;
  return(
    <div className={`task-row flex items-start gap-3 px-4 py-3 rounded-xl border mb-1.5 group bg-white dark:bg-zinc-900 hover:bg-zinc-50 dark:hover:bg-zinc-800/70 border-zinc-100 dark:border-zinc-800 hover:border-zinc-200 dark:hover:border-zinc-700 ${task.completed?'opacity-55':''}`}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}>
      <button onClick={()=>onToggle(task.id)}
        className={`flex-shrink-0 mt-0.5 w-5 h-5 rounded-full border-2 flex items-center justify-center transition-all ${task.completed?'bg-indigo-600 border-indigo-600':'border-zinc-300 dark:border-zinc-600 hover:border-indigo-500'}`}>
        {task.completed&&<I n="check" s={10} c="text-white"/>}
      </button>
      <div className="flex-1 min-w-0">
        <div className={`text-sm font-medium leading-snug ${task.completed?'line-through text-zinc-400 dark:text-zinc-600':'text-zinc-900 dark:text-zinc-100'}`}>{task.title}</div>
        {task.desc&&<div className="text-xs mt-0.5 text-zinc-400 dark:text-zinc-600 truncate">{task.desc}</div>}
        <div className="flex items-center gap-2 mt-1.5 flex-wrap">
          <span className={`flex items-center gap-1 text-xs font-medium ${p.txt}`}><span className={`w-1.5 h-1.5 rounded-full ${p.dot}`}/>{p.lbl}</span>
          {task.dueDate&&<span className={`flex items-center gap-1 text-xs ${overdue?'text-red-500':isToday?'text-amber-500':'text-zinc-400 dark:text-zinc-600'}`}><I n="clock" s={10}/>{overdue?'⚠ ':''}{fmtDate(task.dueDate)}</span>}
          {task.category&&<span className="text-xs px-2 py-0.5 rounded-lg bg-zinc-100 dark:bg-zinc-800 text-zinc-500 dark:text-zinc-500">{task.category}</span>}
        </div>
      </div>
      <div className={`flex items-center gap-1 flex-shrink-0 transition-opacity duration-100 ${hover?'opacity-100':'opacity-0'}`}>
        <button onClick={()=>onEdit(task.id,null,true)} className="p-1.5 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-700 text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 transition-all"><I n="edit" s={13}/></button>
        <button onClick={()=>onDelete(task.id)} className="p-1.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-500/10 text-zinc-400 hover:text-red-500 dark:hover:text-red-400 transition-all"><I n="trash" s={13}/></button>
      </div>
    </div>
  );
}

/* ─── EDIT MODAL ─── */
function EditModal({task,onSave,onClose}){
  const[title,setTitle]=useState(task.title||'');
  const[desc,setDesc]=useState(task.desc||'');
  const[pri,setPri]=useState(task.priority||'medium');
  const[due,setDue]=useState(task.dueDate||'');
  const[cat,setCat]=useState(task.category||'');
  const inp=`w-full px-3 py-2.5 rounded-xl border text-sm outline-none transition-all bg-zinc-50 dark:bg-zinc-800 border-zinc-200 dark:border-zinc-700 text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 dark:placeholder-zinc-600 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/30`;
  return(
    <div className="fixed inset-0 bg-black/50 dark:bg-black/70 flex items-center justify-center z-50 p-4 fade-in" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="w-full max-w-md rounded-2xl bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 shadow-2xl p-6 fade-up">
        <div className="flex items-center justify-between mb-5">
          <h3 className="font-semibold text-zinc-900 dark:text-zinc-100">할 일 수정</h3>
          <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-400 transition-all"><I n="x" s={16}/></button>
        </div>
        <div className="space-y-3">
          <div><label className="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">할 일 *</label>
            <input className={inp} value={title} onChange={e=>setTitle(e.target.value)} autoFocus/></div>
          <div><label className="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">메모</label>
            <textarea className={inp+' resize-none h-20'} value={desc} onChange={e=>setDesc(e.target.value)}/></div>
          <div className="grid grid-cols-3 gap-2">
            <div><label className="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">우선순위</label>
              <select className={inp+' cursor-pointer'} value={pri} onChange={e=>setPri(e.target.value)}>
                <option value="high">🔴 높음</option><option value="medium">🟡 보통</option><option value="low">🟢 낮음</option>
              </select></div>
            <div><label className="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">마감일</label>
              <input type="date" className={inp} value={due} onChange={e=>setDue(e.target.value)}/></div>
            <div><label className="block text-xs font-medium text-zinc-500 dark:text-zinc-400 mb-1.5">카테고리</label>
              <input className={inp} placeholder="예: 업무" value={cat} onChange={e=>setCat(e.target.value)}/></div>
          </div>
        </div>
        <div className="flex gap-2 justify-end mt-5">
          <button onClick={onClose} className="px-4 py-2 rounded-xl text-sm font-medium text-zinc-500 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all">취소</button>
          <button onClick={()=>{onSave({title,desc,priority:pri,dueDate:due,category:cat});onClose();}} className="px-5 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold transition-all shadow-md shadow-indigo-500/25">저장</button>
        </div>
      </div>
    </div>
  );
}

/* ─── CALENDAR ─── */
function CalendarView({todos,onToggle,onEdit,onDelete}){
  const now=new Date();
  const[calY,setCalY]=useState(now.getFullYear());
  const[calM,setCalM]=useState(now.getMonth());
  const[sel,setSel]=useState(null);
  const today=TODAY();
  const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const DOWS=['일','월','화','수','목','금','토'];
  const tmap=useMemo(()=>{const m={};todos.forEach(t=>{if(t.dueDate){if(!m[t.dueDate])m[t.dueDate]=[];m[t.dueDate].push(t);}});return m;},[todos]);
  const cells=useMemo(()=>{
    const f=new Date(calY,calM,1),l=new Date(calY,calM+1,0);
    const sd=f.getDay(),dim=l.getDate(),arr=[];
    for(let i=0;i<sd;i++){const pd=new Date(calY,calM,-(sd-i-1));arr.push({day:pd.getDate(),ds:pd.toISOString().split('T')[0],other:true,dow:i});}
    for(let d=1;d<=dim;d++){const dt=new Date(calY,calM,d);arr.push({day:d,ds:dt.toISOString().split('T')[0],other:false,dow:dt.getDay()});}
    const rem=(7-(arr.length%7))%7;
    for(let j=0;j<rem;j++){const nd=new Date(calY,calM+1,j+1);arr.push({day:nd.getDate(),ds:nd.toISOString().split('T')[0],other:true,dow:nd.getDay()});}
    return arr;
  },[calY,calM]);
  const selTodos=sel?(tmap[sel]||[]):[];
  const prev=()=>{let m=calM-1,y=calY;if(m<0){m=11;y--;}setCalM(m);setCalY(y);};
  const next=()=>{let m=calM+1,y=calY;if(m>11){m=0;y++;}setCalM(m);setCalY(y);};
  return(
    <div>
      <div className="flex items-center justify-between mb-5">
        <button onClick={prev} className="p-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 dark:text-zinc-400 transition-all"><I n="chevL" s={18}/></button>
        <h2 className="text-base font-semibold text-zinc-900 dark:text-zinc-100">{calY}년 {MONTHS[calM]}</h2>
        <button onClick={next} className="p-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 dark:text-zinc-400 transition-all"><I n="chevR" s={18}/></button>
      </div>
      <div className="grid grid-cols-7 gap-1.5 mb-1.5">
        {DOWS.map((d,i)=>(
          <div key={d} className={`text-center text-xs font-semibold py-1 ${i===0?'text-red-400':i===6?'text-blue-400':'text-zinc-400 dark:text-zinc-600'}`}>{d}</div>
        ))}
      </div>
      <div className="grid grid-cols-7 gap-1.5">
        {cells.map((c,idx)=>{
          const td=tmap[c.ds]||[];
          const isT=c.ds===today,isSel=c.ds===sel;
          return(
            <div key={idx} onClick={()=>!c.other&&setSel(isSel?null:c.ds)}
              className={`cal-cell rounded-xl border p-2 min-h-[70px] cursor-pointer
                ${c.other?'opacity-20 pointer-events-none border-transparent bg-transparent':'bg-white dark:bg-zinc-900 border-zinc-100 dark:border-zinc-800 hover:border-zinc-300 dark:hover:border-zinc-600'}
                ${isT&&!c.other?'!border-indigo-400 dark:!border-indigo-500 !bg-indigo-50 dark:!bg-indigo-500/10':''}
                ${isSel&&!isT&&!c.other?'!border-amber-400 dark:!border-amber-500/60 !bg-amber-50 dark:!bg-amber-500/10':''}`}>
              <div className={`text-xs font-semibold mb-1.5 ${isT?'text-indigo-600 dark:text-indigo-400':c.dow===0?'text-red-400':c.dow===6?'text-blue-400':'text-zinc-700 dark:text-zinc-300'}`}>{c.day}</div>
              <div className="flex flex-wrap gap-1">
                {td.slice(0,4).map((t,i)=>(
                  <span key={i} className={`w-2 h-2 rounded-full ${t.completed?'bg-zinc-300 dark:bg-zinc-700':t.priority==='high'?'bg-red-500':t.priority==='low'?'bg-emerald-500':'bg-amber-400'}`}/>
                ))}
                {td.length>4&&<span className="text-[9px] font-bold text-zinc-400 dark:text-zinc-600">+{td.length-4}</span>}
              </div>
            </div>
          );
        })}
      </div>
      {sel&&(
        <div className="mt-4 rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-50 dark:bg-zinc-800/50 p-4 fade-up">
          <div className="flex items-center gap-2 mb-3">
            <I n="cal" s={14} c="text-zinc-400 dark:text-zinc-500"/>
            <h3 className="text-sm font-semibold text-zinc-800 dark:text-zinc-200">{(()=>{const d=new Date(sel+'T00:00:00');return`${d.getMonth()+1}월 ${d.getDate()}일`;})()}</h3>
            <span className="text-xs text-zinc-400 dark:text-zinc-600">{selTodos.length}개</span>
          </div>
          {selTodos.length===0
            ?<p className="text-xs text-zinc-400 dark:text-zinc-600">이 날의 할 일이 없습니다.</p>
            :selTodos.map(t=><TaskItem key={t.id} task={t} onToggle={onToggle} onEdit={onEdit} onDelete={onDelete}/>)
          }
        </div>
      )}
    </div>
  );
}

/* ─── SIDEBAR ─── */
function Sidebar({view,setView,counts,user,onLogout,darkMode,setDarkMode,mob,setMob}){
  const NAV=[{id:'today',n:'clock',lbl:'오늘',cnt:counts.today},{id:'upcoming',n:'cal',lbl:'예정',cnt:counts.upcoming},{id:'all',n:'inbox',lbl:'전체',cnt:counts.all},{id:'completed',n:'check',lbl:'완료',cnt:counts.completed}];
  const PRI_NAV=[{id:'high',lbl:'높음',dot:'bg-red-500'},{id:'medium',lbl:'보통',dot:'bg-amber-400'},{id:'low',lbl:'낮음',dot:'bg-emerald-500'}];
  const nav=id=>`w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-sm font-medium transition-all cursor-pointer ${view===id?'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-700 dark:text-indigo-300':'text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 hover:text-zinc-900 dark:hover:text-zinc-200'}`;
  return(
    <>
      {mob&&<div className="fixed inset-0 bg-black/50 z-30 lg:hidden" onClick={()=>setMob(false)}/>}
      <aside className={`fixed top-0 left-0 h-full w-60 bg-white dark:bg-zinc-900 border-r border-zinc-200 dark:border-zinc-800 flex flex-col z-40 transition-transform duration-200 lg:translate-x-0 ${mob?'translate-x-0':'-translate-x-full'}`}>
        <div className="p-4 border-b border-zinc-100 dark:border-zinc-800">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center flex-shrink-0 shadow-md shadow-indigo-500/30"><I n="list" s={16} c="text-white"/></div>
            <div className="min-w-0"><div className="text-sm font-bold text-zinc-900 dark:text-zinc-100 truncate">Task Planner</div><div className="text-xs text-zinc-400 dark:text-zinc-600 truncate">Hilliard Buffshire</div></div>
          </div>
        </div>
        <div className="flex-1 overflow-y-auto no-scroll p-3 space-y-0.5">
          <p className="text-[10px] font-semibold uppercase tracking-widest text-zinc-400 dark:text-zinc-600 px-3 py-2">메뉴</p>
          {NAV.map(item=>(
            <button key={item.id} onClick={()=>{setView(item.id);setMob(false);}} className={nav(item.id)}>
              <span className="flex items-center gap-2.5"><I n={item.n} s={14}/>{item.lbl}</span>
              {item.cnt>0&&<span className={`text-xs px-1.5 py-0.5 rounded-lg font-semibold ${view===item.id?'bg-indigo-100 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-300':'bg-zinc-100 dark:bg-zinc-800 text-zinc-500 dark:text-zinc-500'}`}>{item.cnt}</span>}
            </button>
          ))}
          <p className="text-[10px] font-semibold uppercase tracking-widest text-zinc-400 dark:text-zinc-600 px-3 py-2 mt-3">우선순위</p>
          {PRI_NAV.map(item=>(
            <button key={item.id} onClick={()=>{setView(item.id);setMob(false);}} className={nav(item.id)}>
              <span className="flex items-center gap-2.5"><span className={`w-2 h-2 rounded-full ${item.dot}`}/>{item.lbl}</span>
            </button>
          ))}
          <p className="text-[10px] font-semibold uppercase tracking-widest text-zinc-400 dark:text-zinc-600 px-3 py-2 mt-3">보기</p>
          <button onClick={()=>{setView('calendar');setMob(false);}} className={nav('calendar')}>
            <span className="flex items-center gap-2.5"><I n="cal" s={14}/>캘린더</span>
          </button>
        </div>
        <div className="p-3 border-t border-zinc-100 dark:border-zinc-800">
          <div className="flex items-center gap-2.5 mb-3 px-1">
            <div className="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-xs font-bold text-white flex-shrink-0">{(user?.displayName||'?')[0].toUpperCase()}</div>
            <div className="flex-1 min-w-0"><div className="text-xs font-semibold text-zinc-800 dark:text-zinc-200 truncate">{user?.displayName||'—'}</div><div className="text-xs text-zinc-400 dark:text-zinc-600">멤버</div></div>
          </div>
          <div className="flex gap-1.5">
            <button onClick={()=>setDarkMode(!darkMode)} className="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-xl text-xs font-medium bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 text-zinc-600 dark:text-zinc-400 transition-all">
              <I n={darkMode?'sun':'moon'} s={13}/>{darkMode?'라이트':'다크'}
            </button>
            <button onClick={onLogout} className="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-xl text-xs font-medium bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 text-zinc-600 dark:text-zinc-400 transition-all">
              <I n="logout" s={13}/>로그아웃
            </button>
          </div>
        </div>
      </aside>
    </>
  );
}

/* ─── MAIN APP ─── */
function MainApp({user}){
  const[todos,setTodos]=useState([]);
  const[view,setView]=useState('today');
  const[search,setSearch]=useState('');
  const[sortBy,setSortBy]=useState('created');
  const[editTask,setEditTask]=useState(null);
  const[darkMode,setDarkMode]=useState(()=>localStorage.getItem('hb_dark')!=='false');
  const[mob,setMob]=useState(false);
  const unsub=useRef(null);
  useEffect(()=>{
    localStorage.setItem('hb_dark',darkMode);
    if(darkMode)document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
  },[darkMode]);
  useEffect(()=>{
    if(!user)return;
    unsub.current=db.collection('todos').where('uid','==',user.uid).orderBy('createdAt','desc').onSnapshot(snap=>{
      setTodos(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return()=>unsub.current?.();
  },[user]);
  useEffect(()=>{
    const h=e=>{if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();document.getElementById('quick-add-trigger')?.click();}};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[]);
  const today=TODAY();
  const addTask=useCallback(async({title,priority,dueDate,category,desc})=>{
    await db.collection('todos').add({title,desc:desc||'',priority,dueDate:dueDate||'',category:category||'',uid:user.uid,completed:false,completedAt:null,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  },[user]);
  const toggleTask=useCallback(id=>{
    const t=todos.find(x=>x.id===id);if(!t)return;
    db.collection('todos').doc(id).update({completed:!t.completed,completedAt:!t.completed?firebase.firestore.FieldValue.serverTimestamp():null});
  },[todos]);
  const editFn=useCallback((id,updates,openModal=false)=>{
    if(openModal){const t=todos.find(x=>x.id===id);if(t)setEditTask(t);return;}
    if(updates)db.collection('todos').doc(id).update(updates);
  },[todos]);
  const deleteTask=useCallback(id=>{if(confirm('삭제하시겠습니까?'))db.collection('todos').doc(id).delete();},[]);
  const saveEdit=useCallback(u=>{if(editTask)db.collection('todos').doc(editTask.id).update(u);},[editTask]);
  const logout=()=>{if(confirm('로그아웃 하시겠습니까?'))auth.signOut();};
  const filtered=useMemo(()=>{
    let list=[...todos];
    const s=search.toLowerCase();
    if(s)list=list.filter(t=>t.title.toLowerCase().includes(s)||(t.desc||'').toLowerCase().includes(s)||(t.category||'').toLowerCase().includes(s));
    if(view!=='calendar'){
      switch(view){
        case'today':list=list.filter(t=>!t.completed&&(!t.dueDate||t.dueDate<=today));break;
        case'upcoming':list=list.filter(t=>!t.completed&&t.dueDate&&t.dueDate>today);break;
        case'completed':list=list.filter(t=>t.completed);break;
        case'high':case'medium':case'low':list=list.filter(t=>t.priority===view);break;
      }
    }
    if(sortBy==='priority'){const po={high:0,medium:1,low:2};list.sort((a,b)=>(po[a.priority]||1)-(po[b.priority]||1));}
    else if(sortBy==='dueDate'){list.sort((a,b)=>{if(!a.dueDate)return 1;if(!b.dueDate)return -1;return a.dueDate.localeCompare(b.dueDate);});}
    return list;
  },[todos,view,search,sortBy,today]);
  const counts=useMemo(()=>({
    today:todos.filter(t=>!t.completed&&(!t.dueDate||t.dueDate<=today)).length,
    upcoming:todos.filter(t=>!t.completed&&t.dueDate&&t.dueDate>today).length,
    all:todos.length,
    completed:todos.filter(t=>t.completed).length,
  }),[todos,today]);
  const total=todos.length,done=todos.filter(t=>t.completed).length,pct=total?Math.round(done/total*100):0;
  const LABELS={today:'오늘의 할 일',upcoming:'예정된 할 일',all:'전체 할 일',completed:'완료한 할 일',high:'높은 우선순위',medium:'보통 우선순위',low:'낮은 우선순위',calendar:'캘린더'};
  return(
    <div className="min-h-screen bg-zinc-50 dark:bg-zinc-950">
      <Sidebar view={view} setView={setView} counts={counts} user={user} onLogout={logout} darkMode={darkMode} setDarkMode={setDarkMode} mob={mob} setMob={setMob}/>
      <div className="lg:ml-60 min-h-screen flex flex-col">
        <header className="sticky top-0 z-20 bg-white dark:bg-zinc-900 border-b border-zinc-100 dark:border-zinc-800 px-4 sm:px-6 py-3 flex items-center gap-3">
          <button onClick={()=>setMob(true)} className="lg:hidden p-2 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500 transition-all"><I n="menu" s={18}/></button>
          <h1 className="text-sm font-semibold text-zinc-900 dark:text-zinc-100 flex-1">{LABELS[view]}</h1>
          <div className="flex items-center gap-2 px-3 py-2 rounded-xl bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700">
            <I n="search" s={13} c="text-zinc-400 dark:text-zinc-600"/>
            <input className="bg-transparent outline-none w-28 sm:w-44 text-sm text-zinc-800 dark:text-zinc-200 placeholder-zinc-400 dark:placeholder-zinc-600" placeholder="검색..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)} className="px-2.5 py-2 rounded-xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-800 text-xs font-medium text-zinc-600 dark:text-zinc-400 outline-none cursor-pointer">
            <option value="created">최신순</option><option value="priority">우선순위순</option><option value="dueDate">마감일순</option>
          </select>
        </header>
        <main className="flex-1 p-4 sm:p-6 max-w-3xl w-full mx-auto">
          {view!=='calendar'&&(
            <div className="bg-white dark:bg-zinc-900 rounded-2xl border border-zinc-100 dark:border-zinc-800 p-4 mb-5 shadow-sm">
              <div className="grid grid-cols-4 gap-3 mb-3">
                {[{lbl:'전체',val:total,c:'text-zinc-700 dark:text-zinc-300'},{lbl:'완료',val:done,c:'text-indigo-600 dark:text-indigo-400'},{lbl:'진행',val:total-done,c:'text-amber-500'},{lbl:'긴급',val:todos.filter(t=>t.priority==='high'&&!t.completed).length,c:'text-red-500'}].map(s=>(
                  <div key={s.lbl} className="text-center">
                    <div className={`text-2xl font-bold ${s.c}`}>{s.val}</div>
                    <div className="text-xs mt-0.5 text-zinc-400 dark:text-zinc-600">{s.lbl}</div>
                  </div>
                ))}
              </div>
              <div className="h-1.5 rounded-full bg-zinc-100 dark:bg-zinc-800 overflow-hidden">
                <div className="h-full bg-indigo-500 rounded-full transition-all duration-700" style={{width:`${pct}%`}}/>
              </div>
              <div className="text-xs mt-1.5 text-right text-zinc-400 dark:text-zinc-600">{pct}% 완료</div>
            </div>
          )}
          {view==='calendar'?(
            <div className="bg-white dark:bg-zinc-900 rounded-2xl border border-zinc-100 dark:border-zinc-800 p-5 shadow-sm">
              <CalendarView todos={todos} onToggle={toggleTask} onEdit={editFn} onDelete={deleteTask}/>
            </div>
          ):(
            <>
              <QuickAdd onAdd={addTask} darkMode={darkMode} defDate={view==='today'?today:''}/>
              {filtered.length===0?(
                <div className="text-center py-16">
                  <div className="text-5xl mb-3">{search?'🔍':'🎉'}</div>
                  <div className="text-sm font-medium text-zinc-500 dark:text-zinc-500">{search?'검색 결과가 없습니다':'할 일이 없습니다!'}</div>
                  <div className="text-xs mt-1 text-zinc-400 dark:text-zinc-600">{search?'다른 키워드로 검색해보세요.':'위에서 할 일을 추가해보세요.'}</div>
                </div>
              ):(
                <div>{filtered.map(t=><TaskItem key={t.id} task={t} onToggle={toggleTask} onEdit={editFn} onDelete={deleteTask}/>)}</div>
              )}
            </>
          )}
        </main>
      </div>
      {editTask&&<EditModal task={editTask} onSave={saveEdit} onClose={()=>setEditTask(null)}/>}
    </div>
  );
}

/* ─── ROOT ─── */
function App(){
  const[user,setUser]=useState(undefined);
  useEffect(()=>{
    const dark=localStorage.getItem('hb_dark')!=='false';
    if(dark)document.documentElement.classList.add('dark');
    return auth.onAuthStateChanged(u=>setUser(u||null));
  },[]);
  if(user===undefined)return(
    <div className="min-h-screen flex items-center justify-center bg-zinc-50 dark:bg-zinc-950">
      <div className="w-8 h-8 rounded-full border-2 border-indigo-500 border-t-transparent animate-spin"/>
    </div>
  );
  if(!user)return <AuthScreen/>;
  return <MainApp user={user}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
})();
</script>
