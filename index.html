<style>

/* Progress bar */
.prog-bar{background:linear-gradient(90deg,#4f46e5,#818cf8)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.fade-up{animation:fadeUp .22s cubic-bezier(.16,1,.3,1) both}
.fade-in{animation:fadeIn .18s ease both}

/* Select */
select option{background:#161618;color:#f4f4f5}

/* Divider line */
.divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent)}

/* Gold accent line */
.gold-line{height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.4),transparent)}

firebase.initializeApp({

const TODAY=()=>new Date().toISOString().split('T')[0];
const fmtDate=d=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return`${dt.getMonth()+1}/${dt.getDate()}`;};
const PRI={high:{lbl:'URGENT',dot:'bg-red-500',txt:'text-red-400',bg:'rgba(239,68,68,0.1)',border:'rgba(239,68,68,0.2)'},medium:{lbl:'NORMAL',dot:'bg-amber-400',txt:'text-amber-400',bg:'rgba(251,191,36,0.08)',border:'rgba(251,191,36,0.2)'},low:{lbl:'LOW',dot:'bg-emerald-500',txt:'text-emerald-400',bg:'rgba(16,185,129,0.08)',border:'rgba(16,185,129,0.2)'}};
const ERRMAP={'auth/user-not-found':'존재하지 않는 아이디입니다.','auth/wrong-password':'비밀번호가 올바르지 않습니다.','auth/email-already-in-use':'이미 사용 중인 아이디입니다.','auth/weak-password':'비밀번호는 6자 이상이어야 합니다.','auth/invalid-credential':'아이디 또는 비밀번호가 올바르지 않습니다.','auth/too-many-requests':'잠시 후 다시 시도하세요.'};

/* ══ AUTH ══ */
function AuthScreen(){
  const[tab,setTab]=useState('login');
  const[id,setId]=useState('');
  const[pw,setPw]=useState('');
  const[err,setErr]=useState('');
  const[busy,setBusy]=useState(false);
  const[showPw,setShowPw]=useState(false);
  const submit=async()=>{
    setErr('');
    if(!id.trim()){setErr('아이디를 입력하세요.');return;}
    if(!pw){setErr('비밀번호를 입력하세요.');return;}
    if(tab==='signup'){
      if(id.trim().length<4){setErr('아이디는 4자 이상이어야 합니다.');return;}
      if(!/^[a-zA-Z0-9_]+$/.test(id.trim())){setErr('영문, 숫자, 밑줄만 사용 가능합니다.');return;}
      if(pw.length<6){setErr('비밀번호는 6자 이상이어야 합니다.');return;}
    }
    setBusy(true);
    try{
      if(tab==='login'){await auth.signInWithEmailAndPassword(toEmail(id),pw);}
      else{const c=await auth.createUserWithEmailAndPassword(toEmail(id),pw);await c.user.updateProfile({displayName:id.trim()});}
    }catch(e){setErr(ERRMAP[e.code]||e.message);setBusy(false);}
  };
  return(
    <div className="min-h-screen auth-bg flex">
      {/* Left brand panel */}
      <div className="hidden lg:flex flex-col justify-between w-[480px] flex-shrink-0 p-16 border-r border-white/[0.04]">
        <div>
          <div className="flex items-center gap-3 mb-20">
            <div className="w-8 h-8 brand-mark rounded flex items-center justify-center">
              <span className="text-black text-xs font-black tracking-tight">HB</span>
            </div>
          </div>
          <div className="gold-line mb-10 w-16"/>
          <h1 className="text-4xl font-black tracking-widest text-gold-gradient uppercase mb-4 leading-tight">
            HILLIARD<br/>BUFFSHIRE
          </h1>
          <p className="text-sm font-light tracking-[0.2em] text-ink-400 uppercase mb-2">Task Planner</p>
          <p className="text-xs tracking-[0.15em] text-ink-600 uppercase">힐리아드 버프셔 태스크 플래너</p>
          <div className="mt-16 space-y-5">
            {[['실시간 동기화','모든 기기에서 동일한 데이터'],['클라우드 저장','Firebase 보안 저장소'],['반응형 디자인','PC·태블릿·모바일 완벽 지원']].map(([t,d])=>(
              <div key={t} className="flex items-start gap-3">
                <div className="w-1 h-1 rounded-full bg-gold-DEFAULT mt-2 flex-shrink-0"/>
                <div><div className="text-xs font-semibold text-ink-200 tracking-wide">{t}</div><div className="text-xs text-ink-500 mt-0.5">{d}</div></div>
              </div>
            ))}
          </div>
        </div>
        <div className="text-xs text-ink-700 tracking-widest uppercase">© 2025 Hilliard Buffshire</div>
      </div>

      {/* Right form */}
      <div className="flex-1 flex items-center justify-center p-6">
        <div className="w-full max-w-sm fade-up">
          {/* Mobile logo */}
          <div className="lg:hidden text-center mb-10">
            <div className="inline-flex w-10 h-10 brand-mark rounded-lg items-center justify-center mb-4">
              <span className="text-black text-sm font-black">HB</span>
            </div>
            <h1 className="text-xl font-black tracking-widest text-gold-gradient uppercase">HILLIARD BUFFSHIRE</h1>
          </div>

          <div className="mb-8">
            <h2 className="text-lg font-bold text-ink-50 tracking-tight">{tab==='login'?'로그인':'계정 만들기'}</h2>
            <p className="text-sm text-ink-500 mt-1">{tab==='login'?'아이디와 비밀번호로 로그인하세요':'사용할 아이디와 비밀번호를 설정하세요'}</p>
          </div>

          {/* Tabs */}
          <div className="flex surface rounded-xl p-1 mb-6">
            {['login','signup'].map(t=>(
              <button key={t} onClick={()=>{setTab(t);setErr('');}}
                className={`flex-1 py-2 text-xs font-semibold rounded-lg tracking-wide uppercase transition-all
                  ${tab===t?'bg-white/[0.07] text-ink-100':'text-ink-500 hover:text-ink-300'}`}>
                {t==='login'?'로그인':'회원가입'}
              </button>
            ))}
          </div>

          <div className="space-y-3">
            <div>
              <label className="block text-[10px] font-semibold text-ink-500 tracking-widest uppercase mb-2">아이디</label>
              <input className="inp-base w-full px-4 py-3 rounded-xl text-sm" placeholder="아이디 입력" value={id} onChange={e=>setId(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
            </div>
            <div>
              <label className="block text-[10px] font-semibold text-ink-500 tracking-widest uppercase mb-2">비밀번호</label>
              <div className="relative">
                <input className="inp-base w-full px-4 py-3 rounded-xl text-sm pr-16" type={showPw?'text':'password'} placeholder="비밀번호 입력" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
                <button onClick={()=>setShowPw(!showPw)} className="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-semibold text-ink-500 hover:text-ink-300 tracking-widest uppercase transition-colors">{showPw?'숨김':'표시'}</button>
              </div>
            </div>
          </div>

          {err&&<div className="mt-3 px-4 py-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-xs tracking-wide">{err}</div>}

          <button onClick={submit} disabled={busy}
            className="btn-primary w-full mt-5 py-3 rounded-xl text-sm font-bold tracking-widest uppercase text-white disabled:opacity-50">
            {busy?'처리 중...':(tab==='login'?'로그인':'회원가입')}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ══ QUICK ADD ══ */
function QuickAdd({onAdd,defDate}){
  const[open,setOpen]=useState(false);
  const[title,setTitle]=useState('');
  const[pri,setPri]=useState('medium');
  const[due,setDue]=useState(defDate||'');
  const[cat,setCat]=useState('');
  const[desc,setDesc]=useState('');
  const ref=useRef();
  const submit=()=>{
    if(!title.trim())return;
    onAdd({title:title.trim(),priority:pri,dueDate:due,category:cat.trim(),desc:desc.trim()});
    setTitle('');setPri('medium');setDue(defDate||'');setCat('');setDesc('');setOpen(false);
  };
  useEffect(()=>{if(open)setTimeout(()=>ref.current?.focus(),50);},[open]);
  return(
    <div className="mb-5">
      {!open?(
        <button id="quick-add-trigger" onClick={()=>setOpen(true)}
          className="w-full flex items-center gap-3 px-5 py-3.5 rounded-xl border border-white/[0.06] border-dashed text-ink-600 hover:border-indigo-500/40 hover:text-indigo-400 hover:bg-indigo-500/[0.04] transition-all text-sm tracking-wide group">
          <I n="plus" s={15}/><span className="font-medium">할 일 추가</span><span className="text-xs text-ink-700 ml-auto group-hover:text-ink-500">Ctrl+N</span>
        </button>
      ):(
        <div className="rounded-xl border border-white/[0.08] bg-ink-800/60 p-5 fade-up" style={{background:'rgba(22,22,24,0.8)'}}>
          <input ref={ref} className="inp-base w-full px-4 py-3 rounded-xl text-sm font-medium mb-3" placeholder="무엇을 해야 하나요?" value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')submit();if(e.key==='Escape')setOpen(false);}}/>
          <textarea className="inp-base w-full px-4 py-2.5 rounded-xl text-xs mb-3 resize-none h-16" placeholder="메모 (선택)" value={desc} onChange={e=>setDesc(e.target.value)}/>
          <div className="grid grid-cols-3 gap-2.5 mb-4">
            {[['우선순위','sel',pri,setPri],['마감일','date',due,setDue],['카테고리','txt',cat,setCat]].map(([lbl,type,val,setter])=>(
              <div key={lbl}>
                <label className="block text-[10px] font-semibold text-ink-600 tracking-widest uppercase mb-1.5">{lbl}</label>
                {type==='sel'?<select className="inp-base w-full px-3 py-2 rounded-lg text-xs cursor-pointer" value={val} onChange={e=>setter(e.target.value)}>
                  <option value="high">🔴 높음</option><option value="medium">🟡 보통</option><option value="low">🟢 낮음</option>
                </select>:type==='date'?<input type="date" className="inp-base w-full px-3 py-2 rounded-lg text-xs" value={val} onChange={e=>setter(e.target.value)}/>
                :<input className="inp-base w-full px-3 py-2 rounded-lg text-xs" placeholder="예: 업무" value={val} onChange={e=>setter(e.target.value)}/>}
              </div>
            ))}
          </div>
          <div className="flex gap-2 justify-end">
            <button onClick={()=>setOpen(false)} className="px-4 py-2 rounded-lg text-xs font-semibold text-ink-500 hover:text-ink-300 hover:bg-white/[0.04] transition-all tracking-wide">취소</button>
            <button onClick={submit} className="btn-primary px-5 py-2 rounded-lg text-xs font-bold tracking-wide uppercase">추가</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══ TASK ITEM ══ */
function TaskItem({task,onToggle,onEdit,onDelete}){
  const[hover,setHover]=useState(false);
  const today=TODAY();
  const overdue=task.dueDate&&task.dueDate<today&&!task.completed;
  const isToday=task.dueDate===today;
  const p=PRI[task.priority]||PRI.medium;
  return(
    <div className={`task-row flex items-start gap-3.5 px-5 py-3.5 rounded-xl mb-2 ${task.completed?'opacity-40':''}`}
      onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}>

          ${task.completed?'bg-indigo-600 border-indigo-600':'border-white/20 hover:border-indigo-500/60 hover:bg-indigo-500/10'}`}>
        {task.completed&&<I n="check" s={10} c="text-white"/>}
      </button>

        <div className={`text-sm font-medium tracking-tight ${task.completed?'line-through text-ink-600':'text-ink-100'}`}>{task.title}</div>

            <span className={`w-1.5 h-1.5 rounded-full ${p.dot}`}/>{p.lbl}
          </span>
          {task.dueDate&&<span className={`flex items-center gap-1 text-[10px] font-medium tracking-wide
            ${overdue?'text-red-400':isToday?'text-amber-400':'text-ink-600'}`}>
            <I n="clock" s={10}/>{overdue?'⚠ ':''}{fmtDate(task.dueDate)}

          {task.category&&<span className="text-[10px] font-medium px-2 py-1 rounded-md tracking-wide" style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.07)',color:'#71717a'}}>{task.category}</span>}

        <button onClick={()=>onEdit(task.id,null,true)} className="p-1.5 rounded-lg hover:bg-white/[0.06] text-ink-600 hover:text-ink-300 transition-all"><I n="edit" s={13}/></button>

      </div>
    </div>
  );
}

/* ══ CALENDAR ══ */
function CalendarView({todos,onToggle,onEdit,onDelete}){
  const now=new Date();
  const[calY,setCalY]=useState(now.getFullYear());
  const[calM,setCalM]=useState(now.getMonth());
  const[sel,setSel]=useState(null);
  const today=TODAY();
  const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const DOWS=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const tmap=useMemo(()=>{const m={};todos.forEach(t=>{if(t.dueDate){if(!m[t.dueDate])m[t.dueDate]=[];m[t.dueDate].push(t);}});return m;},[todos]);
  const cells=useMemo(()=>{
    const f=new Date(calY,calM,1),l=new Date(calY,calM+1,0);
    const sd=f.getDay(),dim=l.getDate(),arr=[];
    for(let i=0;i<sd;i++){const pd=new Date(calY,calM,-(sd-i-1));arr.push({day:pd.getDate(),ds:pd.toISOString().split('T')[0],other:true,dow:i});}
    for(let d=1;d<=dim;d++){const dt=new Date(calY,calM,d);arr.push({day:d,ds:dt.toISOString().split('T')[0],other:false,dow:dt.getDay()});}
    const rem=(7-(arr.length%7))%7;
    for(let j=0;j<rem;j++){const nd=new Date(calY,calM+1,j+1);arr.push({day:nd.getDate(),ds:nd.toISOString().split('T')[0],other:true,dow:nd.getDay()});}
    return arr;
  },[calY,calM]);
  const selTodos=sel?(tmap[sel]||[]):[];
  const prev=()=>{let m=calM-1,y=calY;if(m<0){m=11;y--;}setCalM(m);setCalY(y);};
  const next=()=>{let m=calM+1,y=calY;if(m>11){m=0;y++;}setCalM(m);setCalY(y);};
  return(
    <div>
      <div className="flex items-center justify-between mb-6">
        <button onClick={prev} className="p-2 rounded-lg hover:bg-white/[0.05] text-ink-500 hover:text-ink-300 transition-all border border-white/[0.05]"><I n="chevL" s={16}/></button>
        <div className="text-center">
          <div className="text-base font-bold text-ink-100 tracking-tight">{calY}년 {MONTHS[calM]}</div>
        </div>
        <button onClick={next} className="p-2 rounded-lg hover:bg-white/[0.05] text-ink-500 hover:text-ink-300 transition-all border border-white/[0.05]"><I n="chevR" s={16}/></button>
      </div>
      <div className="grid grid-cols-7 gap-1.5 mb-2">
        {DOWS.map((d,i)=>(
          <div key={d} className={`text-center text-[9px] font-bold tracking-widest py-1.5 ${i===0?'text-red-500/70':i===6?'text-blue-500/70':'text-ink-700'}`}>{d}</div>
        ))}
      </div>
      <div className="grid grid-cols-7 gap-1.5">
        {cells.map((c,idx)=>{
          const td=tmap[c.ds]||[];
          const isT=c.ds===today,isSel=c.ds===sel;
          return(
            <div key={idx} onClick={()=>!c.other&&setSel(isSel?null:c.ds)}
              className={`cal-cell rounded-xl p-2 min-h-[68px] border
                ${c.other?'opacity-0 pointer-events-none border-transparent':'border-white/[0.05] hover:border-white/[0.1]'}
                ${isT&&!c.other?'border-indigo-500/40':''}
                ${isSel&&!isT&&!c.other?'border-gold-DEFAULT/40':''}`}
              style={{background:c.other?'transparent':isT?'rgba(99,102,241,0.08)':isSel&&!isT?'rgba(201,168,76,0.06)':'rgba(255,255,255,0.02)'}}>
              <div className={`text-xs font-bold mb-2 ${isT?'text-indigo-400':c.dow===0?'text-red-500/70':c.dow===6?'text-blue-500/70':'text-ink-400'}`}>{c.day}</div>
              <div className="flex flex-wrap gap-1">
                {td.slice(0,5).map((t,i)=>(
                  <span key={i} className={`w-1.5 h-1.5 rounded-full ${t.completed?'bg-white/20':t.priority==='high'?'bg-red-500':t.priority==='low'?'bg-emerald-500':'bg-amber-400'}`}/>
                ))}
                {td.length>5&&<span className="text-[8px] font-bold text-ink-700">+{td.length-5}</span>}
              </div>
            </div>
          );
        })}
      </div>
      {sel&&(
        <div className="mt-5 rounded-xl border border-white/[0.07] p-4 fade-up" style={{background:'rgba(17,17,19,0.8)'}}>
          <div className="flex items-center gap-3 mb-4">
            <div className="gold-line w-6"/>
            <h3 className="text-xs font-bold text-ink-300 tracking-widest uppercase">{(()=>{const d=new Date(sel+'T00:00:00');return`${d.getMonth()+1}월 ${d.getDate()}일`;})()}</h3>
            <span className="text-[10px] text-ink-700 tracking-wide">{selTodos.length}개</span>
          </div>
          {selTodos.length===0
            ?<p className="text-xs text-ink-700 text-center py-4 tracking-wide">이 날의 할 일이 없습니다.</p>
            :selTodos.map(t=><TaskItem key={t.id} task={t} onToggle={onToggle} onEdit={onEdit} onDelete={onDelete}/>)
          }
        </div>
      )}
    </div>
  );
}

/* ══ MAIN APP ══ */
function MainApp({user}){
  const[todos,setTodos]=useState([]);
  const[view,setView]=useState('today');
  const[search,setSearch]=useState('');
  const[sortBy,setSortBy]=useState('created');
  const[editTask,setEditTask]=useState(null);
  const[darkMode,setDarkMode]=useState(()=>localStorage.getItem('hb_dark')!=='false');
  const[mob,setMob]=useState(false);
  const unsub=useRef(null);
  useEffect(()=>{
    localStorage.setItem('hb_dark',darkMode);
    if(darkMode)document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
  },[darkMode]);
  useEffect(()=>{
    if(!user)return;
    unsub.current=db.collection('todos').where('uid','==',user.uid).orderBy('createdAt','desc').onSnapshot(snap=>{
      setTodos(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return()=>unsub.current?.();
  },[user]);
  useEffect(()=>{
    const h=e=>{if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();document.getElementById('quick-add-trigger')?.click();}};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[]);
  const today=TODAY();
  const addTask=useCallback(async({title,priority,dueDate,category,desc})=>{
    await db.collection('todos').add({title,desc:desc||'',priority,dueDate:dueDate||'',category:category||'',uid:user.uid,completed:false,completedAt:null,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  },[user]);
  const toggleTask=useCallback(id=>{
    const t=todos.find(x=>x.id===id);if(!t)return;
    db.collection('todos').doc(id).update({completed:!t.completed,completedAt:!t.completed?firebase.firestore.FieldValue.serverTimestamp():null});
  },[todos]);
  const editFn=useCallback((id,updates,openModal=false)=>{
    if(openModal){const t=todos.find(x=>x.id===id);if(t)setEditTask(t);return;}
    if(updates)db.collection('todos').doc(id).update(updates);
  },[todos]);
  const deleteTask=useCallback(id=>{if(confirm('삭제하시겠습니까?'))db.collection('todos').doc(id).delete();},[]);
  const saveEdit=useCallback(u=>{if(editTask)db.collection('todos').doc(editTask.id).update(u);},[editTask]);
  const logout=()=>{if(confirm('로그아웃 하시겠습니까?'))auth.signOut();};
  const filtered=useMemo(()=>{
    let list=[...todos];
    const s=search.toLowerCase();
    if(s)list=list.filter(t=>t.title.toLowerCase().includes(s)||(t.desc||'').toLowerCase().includes(s)||(t.category||'').toLowerCase().includes(s));
    if(view!=='calendar'){
      switch(view){
        case'today':list=list.filter(t=>!t.completed&&(!t.dueDate||t.dueDate<=today));break;
        case'upcoming':list=list.filter(t=>!t.completed&&t.dueDate&&t.dueDate>today);break;
        case'completed':list=list.filter(t=>t.completed);break;
        case'high':case'medium':case'low':list=list.filter(t=>t.priority===view);break;
      }
    }
    if(sortBy==='priority'){const po={high:0,medium:1,low:2};list.sort((a,b)=>(po[a.priority]||1)-(po[b.priority]||1));}
    else if(sortBy==='dueDate'){list.sort((a,b)=>{if(!a.dueDate)return 1;if(!b.dueDate)return -1;return a.dueDate.localeCompare(b.dueDate);});}
    return list;
  },[todos,view,search,sortBy,today]);
  const counts=useMemo(()=>({
    today:todos.filter(t=>!t.completed&&(!t.dueDate||t.dueDate<=today)).length,
    upcoming:todos.filter(t=>!t.completed&&t.dueDate&&t.dueDate>today).length,
    all:todos.length,
    completed:todos.filter(t=>t.completed).length,
  }),[todos,today]);
  const total=todos.length,done=todos.filter(t=>t.completed).length,pct=total?Math.round(done/total*100):0;
  const LABELS={today:'TODAY',upcoming:'UPCOMING',all:'ALL TASKS',completed:'COMPLETED',high:'URGENT',medium:'NORMAL',low:'LOW PRIORITY',calendar:'CALENDAR'};
  return(
    <div className="min-h-screen app-bg">
      <Sidebar view={view} setView={setView} counts={counts} user={user} onLogout={logout} darkMode={darkMode} setDarkMode={setDarkMode} mob={mob} setMob={setMob}/>
      <div className="lg:ml-64 min-h-screen flex flex-col">
        {/* Topbar */}
        <header className="sticky top-0 z-20 topbar-glass px-5 sm:px-8 py-4 flex items-center gap-4">
          <button onClick={()=>setMob(true)} className="lg:hidden p-2 rounded-lg hover:bg-white/[0.05] text-ink-600 transition-all"><I n="menu" s={17}/></button>
          <div className="flex-1">
            <div className="text-[10px] font-black tracking-[0.25em] text-ink-700 uppercase">HILLIARD BUFFSHIRE</div>
            <div className="text-sm font-bold text-ink-200 tracking-widest uppercase mt-0.5">{LABELS[view]}</div>
          </div>
          <div className="flex items-center gap-2 px-4 py-2.5 rounded-xl border border-white/[0.07]" style={{background:'rgba(255,255,255,0.03)'}}>
            <I n="search" s={13} c="text-ink-700"/>
            <input className="bg-transparent outline-none w-28 sm:w-48 text-sm text-ink-300 placeholder-ink-700" placeholder="검색..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
            className="px-3 py-2.5 rounded-xl border border-white/[0.07] text-[10px] font-bold tracking-widest uppercase text-ink-500 hover:text-ink-300 outline-none cursor-pointer transition-all"
            style={{background:'rgba(255,255,255,0.03)'}}>
            <option value="created">RECENT</option>
            <option value="priority">PRIORITY</option>
            <option value="dueDate">DUE DATE</option>
          </select>
        </header>

        <main className="flex-1 p-5 sm:p-8 max-w-3xl w-full mx-auto">
          {/* Stats */}
          {view!=='calendar'&&(
            <div className="rounded-2xl p-5 mb-6" style={{background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.055)'}}>
              <div className="grid grid-cols-4 gap-4 mb-4">
                {[
                  {lbl:'TOTAL',val:total,c:'text-ink-300'},
                  {lbl:'DONE',val:done,c:'text-indigo-400'},
                  {lbl:'ACTIVE',val:total-done,c:'text-amber-400'},
                  {lbl:'URGENT',val:todos.filter(t=>t.priority==='high'&&!t.completed).length,c:'text-red-400'},
                ].map(s=>(
                  <div key={s.lbl} className="text-center">
                    <div className={`text-2xl font-black ${s.c}`}>{s.val}</div>
                    <div className="text-[9px] font-bold tracking-[0.2em] text-ink-700 mt-1 uppercase">{s.lbl}</div>
                  </div>
                ))}
              </div>
              <div className="h-px rounded-full overflow-hidden" style={{background:'rgba(255,255,255,0.05)'}}>
                <div className="h-full prog-bar rounded-full transition-all duration-700" style={{width:`${pct}%`}}/>
              </div>
              <div className="flex justify-between mt-2">
                <div className="text-[10px] text-ink-700 tracking-widest uppercase">Progress</div>
                <div className="text-[10px] font-bold text-ink-500 tracking-widest">{pct}%</div>
              </div>
            </div>
          )}

          {view==='calendar'?(
            <div className="rounded-2xl p-6" style={{background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.055)'}}>
              <div className="flex items-center gap-3 mb-6">
                <div className="gold-line w-6"/>
                <span className="text-[10px] font-black tracking-[0.2em] text-ink-600 uppercase">Calendar View</span>
              </div>
              <CalendarView todos={todos} onToggle={toggleTask} onEdit={editFn} onDelete={deleteTask}/>
            </div>
          ):(
            <>
              <QuickAdd onAdd={addTask} defDate={view==='today'?today:''}/>
              {filtered.length===0?(
                <div className="text-center py-20">
                  <div className="text-4xl mb-4 opacity-20">{search?'○':'◎'}</div>
                  <div className="text-xs font-bold tracking-[0.2em] text-ink-700 uppercase">{search?'NO RESULTS FOUND':'NO TASKS'}</div>
                  <div className="text-xs text-ink-800 mt-2 tracking-wide">{search?'다른 키워드로 검색해보세요':'위에서 할 일을 추가해보세요'}</div>
                </div>
              ):(
                <div>{filtered.map(t=><TaskItem key={t.id} task={t} onToggle={toggleTask} onEdit={editFn} onDelete={deleteTask}/>)}</div>
              )}
            </>
          )}
        </main>
      </div>
      {editTask&&<EditModal task={editTask} onSave={saveEdit} onClose={()=>setEditTask(null)}/>}
    </div>
  );
}

function App(){
  const[user,setUser]=useState(undefined);
  useEffect(()=>{
    document.documentElement.classList.add('dark');
    return auth.onAuthStateChanged(u=>setUser(u||null));
  },[]);
  if(user===undefined)return(
    <div className="min-h-screen flex items-center justify-center" style={{background:'#09090b'}}>
      <div className="w-6 h-6 rounded-full border-2 border-gold-DEFAULT border-t-transparent animate-spin"/>
    </div>
  );
  if(!user)return <AuthScreen/>;
  return <MainApp user={user}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
})();
</script>
</body>
</html>
